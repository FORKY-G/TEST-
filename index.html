<!DOCTYPE html>
<html lang="ko">
<head>
    <title>한월환해도(0327 업데이트)</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <link rel="stylesheet" href="https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
    <script src="https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.js"></script>
    <style>
        /* 기본 레이아웃 */
        html, body, #map { width:100%; height:100%; margin:0; padding:0; background: #fff; }
        body { font-family: 'Malgun Gothic', sans-serif; }

/* 1. 팝업창을 마인크래프트 UI 스타일로 고정 */
.leaflet-popup-content-wrapper {
    background: #C6C6C6 !important; /* 마크 UI 회색 */
    border: 3px solid #000000 !important; /* 검은색 테두리 */
    box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
    border-radius: 0px !important;
    padding: 2px;
}

/* 팝업 꼬리 부분 제거 또는 디자인 통일 */
.leaflet-popup-tip-container { display: none; } 

.leaflet-popup-content {
    margin: 12px 15px !important;
    font-family: 'Malgun Gothic', sans-serif;
    color: #3F3F3F !important;
    text-shadow: 1px 1px 0px #ffffff;
    font-weight: bold;

}

/* 팝업 닫기 버튼 (X) 수정 */
.leaflet-popup-close-button {
    color: #3F3F3F !important;
    padding: 5px !important;
    font-weight: bold;
}

.leaflet-popup-close-button:hover {
    background: #D5D5D5 !important;
    border-radius: 0px !important;
}

/* 십이간지 아이콘 마우스 오버 시 나타나는 툴팁 스타일 */
.custom-tooltip {
    background: #C6C6C6 !important; /* 마인크래프트 UI 기본 회색 */
    border: 3px solid #000000 !important; /* 검은색 각진 테두리 */
    box-shadow: inset -3px -3px 0px #555555, inset 3px 3px 0px #ffffff !important; /* 입체감 효과 */
    border-radius: 0px !important; /* 각진 디자인 */
    color: #3F3F3F !important; /* 글자색 */
    font-weight: bold !important;
    text-shadow: 1px 1px 0px #ffffff; /* 마인크래프트 폰트 느낌의 그림자 */
    padding: 5px 10px !important;
    font-family: 'Malgun Gothic', sans-serif;
    opacity: 1 !important; /* 투명도 제거 */
}

/* 툴팁 아래쪽 화살표 제거 (마인크래프트 UI는 보통 사각형이므로 제거하는 것이 더 자연스럽습니다) */
.custom-tooltip:before {
    display: none !important;
} 


/* 2. 오른쪽 레이어 컨트롤 박스 크기 줄이기 */
        .leaflet-control-layers-overlays { font-size: 14px; font-weight: bold; }
.leaflet-control-layers {
    max-height: 400px; /* 최대 높이 제한 */
    width: 180px;      /* 너비 축소 */
    overflow-y: auto;  /* 내용이 많으면 스크롤 */
    background: #C6C6C6 !important;
    border: 3px solid #000 !important;
    box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff !important;
    border-radius: 0px !important;
        .hunt-group-label { color: #e74c3c; border-bottom: 2px solid #e74c3c; display: block; margin-top: 10px; margin-bottom: 5px; }
        .herb-group-label { color: #8e44ad; border-bottom: 2px solid #8e44ad; display: block; margin-top: 10px; margin-bottom: 5px; }
        .mine-group-label { color: #27ae60; border-bottom: 2px solid #27ae60; display: block; margin-top: 10px; margin-bottom: 5px; }
        .divider-line { border-bottom: 1px solid #ccc; display: block; margin: 5px 0; }
}

        /* 정보 패널 (사냥터용) */
/* 사냥터 정보 패널 (마인크래프트 UI 테마 적용) */
.info-panel {
    position: absolute; 
    top: 50px; 
    left: 200px; 
    z-index: 1000;
    /* 마인크래프트 기본 회색 배경 및 테두리 */
    background: #C6C6C6 !important; 
    padding: 15px;
    border: 3px solid #000 !important;
    box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
    border-radius: 0px !important; /* 각진 디자인 */
    min-width: 250px; 
    display: none;
}

/* 패널 내부 제목 및 텍스트 스타일 */
#panel-name {
    margin: 0; 
    color: #3F3F3F !important; /* 어두운 회색 */
    text-shadow: 1px 1px 0px #ffffff;
    font-family: 'Malgun Gothic', sans-serif;
}

#panel-lv {
    color: #3F3F3F;
    text-shadow: 1px 1px 0px #ffffff;
    margin-top: 10px;
}

/* 패널 내 닫기 버튼을 마인크래프트 버튼 스타일로 변경 */
.info-panel button {
    margin-top: 15px;
    cursor: pointer;
    width: 100%;
    padding: 8px;
    background: #C6C6C6;
    border: 2px solid #000;
    box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff;
    color: #3F3F3F;
    font-weight: bold;
    text-shadow: 1px 1px 0px #ffffff;
    outline: none;
}

/* 버튼에 마우스 올렸을 때 하이라이트 효과 */
.info-panel button:hover {
    background: #D5D5D5;
}

/* 버튼 클릭 시 눌리는 효과 */
.info-panel button:active {
    box-shadow: inset 2px 2px 0px #555555, inset -2px -2px 0px #ffffff;
}

/* 1. 구분선(<span class='divider-line'>)이 포함된 항목의 체크박스 숨기기 */
.leaflet-control-layers-overlays label:has(.divider-line) input {
    display: none !important;
}

/* 2. 제목 라벨(광산, 사냥터, 약초)이 포함된 항목의 체크박스 숨기기 */
.leaflet-control-layers-overlays label:has(.mine-group-label) input,
.leaflet-control-layers-overlays label:has(.hunt-group-label) input,
.leaflet-control-layers-overlays label:has(.herb-group-label) input {
    display: none !important;
}

/* 3. 체크박스가 사라진 자리에 텍스트가 왼쪽으로 붙도록 조정 */
.leaflet-control-layers-overlays label:has(.divider-line) span,
.leaflet-control-layers-overlays label:has(.mine-group-label) span,
.leaflet-control-layers-overlays label:has(.hunt-group-label) span,
.leaflet-control-layers-overlays label:has(.herb-group-label) span {
    margin-left: -0px; /* 체크박스 공간만큼 왼쪽으로 당김 */
    display: block;
}

/* 레이어 컨트롤 메뉴 전체에 마인크래프트 스타일 스크롤바 적용 */
.leaflet-control-layers-overlays::-webkit-scrollbar {
    width: 12px; /* 스크롤바 너비 */
}

/* 스크롤바 배경 (마인크래프트 어두운 UI 배경 느낌) */
.leaflet-control-layers-overlays::-webkit-scrollbar-track {
    background: #313131; 
    border: 2px solid #000;
}

/* 스크롤바 막대 (아이템 슬롯이나 버튼 느낌) */
.leaflet-control-layers-overlays::-webkit-scrollbar-thumb {
    background: #8B8B8B;
    border: 2px solid #ffffff; /* 하이라이트 테두리 */
    box-shadow: inset -3px -3px 0px #404040; /* 입체감 주는 그림자 */
}

/* 마우스 올렸을 때 막대 색상 변경 (활성화된 버튼 느낌) */
.leaflet-control-layers-overlays::-webkit-scrollbar-thumb:hover {
    background: #AAAAAA;
    box-shadow: inset -3px -3px 0px #555555;
}

/* Firefox 브라우저 대응 */
.leaflet-control-layers-overlays {
    scrollbar-width: auto;
    scrollbar-color: #8B8B8B #313131;
}

/* 레이어 컨트롤 박스 전체 디자인 수정 */
.leaflet-control-layers {
    background: #C6C6C6 !important; /* 마인크래프트 기본 UI 회색 */
    border: 3px solid #000 !important;
    box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
    border-radius: 0px !important; /* 각진 디자인 */
    padding: 10px;
}

/* 내부 텍스트 스타일 수정 */
.leaflet-control-layers-overlays label {
    color: #3F3F3F;
    text-shadow: 1px 1px 0px #ffffff; /* 마인크래프트 폰트 느낌의 그림자 */
    cursor: pointer;
}

/* 검색창 전체 컨테이너 위치 조정 */
#search-container {
    top: 25px !important; /* 위쪽 여백 살짝 조정 */
}

/* 검색 입력창 (마인크래프트 입력칸 느낌) */
#search-input {
    background: #000000 !important; /* 검은색 배경 */
    color: #ffffff !important; /* 흰색 글씨 */
    border: 2px solid #ffffff !important; /* 흰색 각진 테두리 */
    box-shadow: inset -2px -2px 0px #404040 !important; /* 입체감 주는 그림자 */
    border-radius: 0px !important; /* 각진 디자인 */
    font-family: 'Malgun Gothic', sans-serif;
    font-size: 16px;
    padding: 10px 15px;
    outline: none; /* 포커스 테두리 제거 */
}

/* 입력창에 마우스 올렸을 때 테두리 색상 변경 */
#search-input:hover {
    border-color: #AAAAAA !important;
}

/* 입력창 클릭(포커스) 시 테두리 색상 변경 (활성화 상태) */
#search-input:focus {
    border-color: #55FF55 !important; /* 연두색 테두리 */
}

/* 검색 버튼 (마인크래프트 버튼 느낌) */
#search-container button {
    background: #C6C6C6 !important; /* 마인크래프트 기본 회색 배경 */
    color: #3F3F3F !important; /* 어두운 회색 글씨 */
    border: 3px solid #000000 !important; /* 검은색 각진 테두리 */
    box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important; /* 입체감 주는 그림자 */
    border-radius: 0px !important; /* 각진 디자인 */
    font-weight: bold;
    font-size: 16px;
    text-shadow: 1px 1px 0px #ffffff; /* 마인크래프트 폰트 느낌의 그림자 */
    padding: 10px 20px;
    cursor: pointer;
    outline: none;
    transition: background 0.1s; /* 부드러운 색상 변경 */
}

/* 검색 버튼에 마우스 올렸을 때 하이라이트 효과 */
#search-container button:hover {
    background: #D5D5D5 !important;
}

/* 검색 버튼 클릭 시 눌리는 효과 */
#search-container button:active {
    box-shadow: inset 4px 4px 0px #555555, inset -4px -4px 0px #ffffff !important;
}

/* 기본 작은 마커 스타일 */
.mc-icon-small {
    background: #C6C6C6; 
    border: 2px solid #000; 
    box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff;
    border-radius: 0;
    transition: transform 0.1s ease-out; /* 부드러운 확대 효과 */
}

/* 마우스 오버 시 확대되는 마커 스타일 */
.mc-icon-small.leaflet-marker-pane:hover,
.mc-icon-small.mc-icon-small:hover {
    transform: scale(2.5) translate(-10px, -10px); /* 크기 확대 및 위치 조정 */
    z-index: 1000 !important; /* 위로 올리기 */
}

/* 기본 작은 도트 스타일 */
.mc-icon-small {
    border: 1px solid #000;
    box-shadow: inset -1px -1px 0px #555555, inset 1px 1px 0px #ffffff;
    border-radius: 0;
}

/* 마우스 오버 시 나타나는 박스 설정 */
.mc-hover-active {
    background: #C6C6C6 !important;
    border: 4px solid #000 !important; /* 테두리 더 두껍게 */
    box-shadow: inset -6px -6px 0px #555555, inset 6px 6px 0px #ffffff !important; /* 입체감 강화 */
    transform: scale(1) translate(-50%, -110%) !important; /* 크기 조절 대신 고정 크기 사용 */
    z-index: 1000 !important;
    
    /* 박스 크기 대폭 확대 */
    width: 70px !important; 
    height: 70px !important;
    
    display: flex !important;
    justify-content: center;
    align-items: center;
    position: absolute;
    left: 50%;
    top: 0;
}

    </style>
</head>
<body>

    <div id="search-container" style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 2000; display: flex; gap: 5px;">
        <input type="text" id="search-input" placeholder="사냥터, 광산, 약초 검색..." 
               onkeypress="if(event.keyCode==13) { executeSearch(); return false; }"
               style="padding: 10px; width: 250px; border-radius: 8px; border: 2px solid #e67e22; outline: none; font-size: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.3);">
        <button onclick="executeSearch()" 
                style="padding: 10px 20px; background: #e67e22; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.3);">
            검색
        </button>
    </div>

    <div id="map"></div>

    <div id="hunting-info-panel" class="info-panel">
        <h4 id="panel-name" style="margin: 0; color: #e74c3c;"></h4>
        <div id="panel-lv"></div>
        <button onclick="document.getElementById('hunting-info-panel').style.display='none'" 
                style="margin-top:15px; cursor:pointer; width:100%; padding:5px; border-radius:5px; border:1px solid #ccc; background:#f9f9f9; font-weight:bold;">
            닫기
        </button>
    </div>

<script>
        // 1. 기본 맵 설정
        var imgW = 7300, imgH = 6494;
        var imageBounds = [[-imgH, 0], [0, imgW]];
        var map = new L.Map('map', { maxZoom: 12, minZoom: -5, crs: L.CRS.Simple, noWrap: true, zoomSnap: 0.25 });
        L.imageOverlay('map.jpg', imageBounds).addTo(map);
        map.fitBounds(imageBounds);

        function mcToPx(mcX, mcZ) {
            var mcSpawnPxX = 3218, mcSpawnPxY = 2874;
            var mcSpawnCoordX = -971, mcSpawnCoordZ = -965;
            var scale = 7300 / 16384; 
            var x = mcSpawnPxX + (mcX - mcSpawnCoordX) * scale;
            var y = mcSpawnPxY + (mcZ - mcSpawnCoordZ) * scale;
            return [-y, x]; 
        }

function createHtmlIcon(color, label) {
            return L.divIcon({
                className: 'mc-icon-parent', // 부모 클래스명 변경
                html: `<div class="mc-hitbox" style="
                           width: 40px; height: 40px; /* 실제 마우스 반응 범위 (대폭 확대) */
                           display: flex; justify-content: center; align-items: center;
                           cursor: pointer;">
                           <div class="mc-dot" style="
                               width: 14px; height: 14px; /* 눈에 보이는 도트 크기 */
                               background: ${color}; 
                               border: 1px solid #000;
                               box-shadow: inset -1px -1px 0px #555, inset 1px 1px 0px #fff;
                               display: flex; justify-content: center; align-items: center;
                               font-family: 'Malgun Gothic', sans-serif;
                               font-size: 1px; color: transparent; /* 평소엔 글자 숨김 */
                               transition: all 0.1s;">
                               ${label}
                           </div>
                       </div>`,
                iconSize: [40, 40], // 히트박스 크기와 동일하게
                iconAnchor: [20, 20], 
                popupAnchor: [0, -20]
            });
        }

        function createHerbIcon(color) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background:${color}; width:24px; height:24px; border-radius:50%; border:2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.4);"></div>`,
                iconSize: [24, 24], iconAnchor: [12, 12]
            });
        }

        // 2. 데이터 정의
        var herbColors = { "빙백설화": "#3498db", "철목영지": "#e67e22", "월계엽": "#2ecc71", "금향과": "#f1c40f", "녹태": "#16a085", "황초": "#f39c12", "적주과": "#e74c3c", "옥취엽": "#d35400", "옥향초": "#8e44ad", "인삼": "#c0392b", "자운초": "#9b59b6", "생강": "#7f8c8d", "민들레": "#e67e22", "영군버섯": "#2980b9", "금양광초": "#f1c40f", "권엽": "#27ae60", "흑성과": "#2c3e50", "백향초": "#ecf0f1" };
        var poiData = [

        huntingInfo.forEach(function(i) { menuOrder[i.name] = huntingLayers[i.name]; });
        menuOrder["<span class='herb-group-label'>🌿 약초 서식지 </span>"] = allHerbsGroup;
        Object.keys(herbLayers).sort().forEach(function(name) { menuOrder[name] = herbLayers[name]; });

        L.control.layers(null, menuOrder, {collapsed: false}).addTo(map);

 // 6. 검색 기능 (팝업 자동 열기 기능 추가)
        function executeSearch() {
            var input = document.getElementById('search-input');
            var query = input.value.trim(); if (!query) return;
            var found = false, target = null, targetMarker = null;

            // 1) 사냥터 검색
            huntingInfo.forEach(function(info) {
                if (info.name.includes(query)) {
                    target = info.center; found = true;
                    if (!map.hasLayer(huntingLayers[info.name])) { 
                        map.addLayer(huntingLayers[info.name]); 
                        updateLayerCheckbox(info.name, true); 
                    }
                }
            });

            // 2) 광산 검색
            if (!found) {
                poiData.forEach(function(poi) {
                    if (poi.name === query || (poi.name + "번").includes(query)) {
                        target = poi.coords; found = true;
                        var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
                        
                        if (key) {
                            if (!map.hasLayer(poiLayers[key])) { 
                                map.addLayer(poiLayers[key]); 
                                updateLayerCheckbox(key, true); 
                            }
                            // 해당 레이어 안에서 좌표가 일치하는 마커 찾기
                            poiLayers[key].eachLayer(function(layer) {
                                if (layer instanceof L.Marker && layer.getLatLng().equals(target)) {
                                    targetMarker = layer;
                                }
                            });
                        }
                    }
                });
            }

            // 3) 약초 검색
            if (!found) {
                herbData.forEach(function(herb) {
                    if (herb.name.includes(query)) {
                        target = herb.coords; found = true;
                        if (!map.hasLayer(herbLayers[herb.name])) { 
                            map.addLayer(herbLayers[herb.name]); 
                            updateLayerCheckbox(herb.name, true); 
                        }
                        // 약초 레이어 안에서 마커 찾기
                        herbLayers[herb.name].eachLayer(function(layer) {
                            if (layer instanceof L.Marker && layer.getLatLng().equals(target)) {
                                targetMarker = layer;
                            }
                        });
                    }
                });
            }

            if (found) { 
                map.setView(target, -1); 
                // 검색된 마커가 있으면 팝업을 열어줍니다.
                if (targetMarker) {
                    targetMarker.openPopup();
                }
                input.value = ""; 
            } 
            else { alert("검색 결과가 없습니다."); }
        }

        function updateLayerCheckbox(name, isChecked) {
            document.querySelectorAll('.leaflet-control-layers-overlays label').forEach(function(label) {
                if (label.innerText.trim() === name) {
                    var cb = label.querySelector('input'); if (cb) cb.checked = isChecked;
                }
            });
        }

        map.on('overlayadd overlayremove', function(e) {
            if (e.name.includes('약초 서식지')) {
                var isAdd = (e.type === 'overlayadd');
                Object.keys(herbLayers).forEach(function(name) {
                    if (isAdd) map.addLayer(herbLayers[name]); else map.removeLayer(herbLayers[name]);
                    updateLayerCheckbox(name, isAdd);
                });
            }
        });

// 마커에 마우스 올렸을 때 색상별로 글자색 다르게 표시
        map.on('layeradd', function(e) {
            var layer = e.layer;
            if (layer instanceof L.Marker && layer.options.icon && layer.options.icon.options.className === 'mc-icon-small') {
                
                layer.on('mouseover', function() {
                    var el = this.getElement().querySelector('div');
                    var iconColor = el.style.background; // 현재 도트의 배경색(녹, 청, 황, 적)을 가져옴
                    
                    this.getElement().classList.add('mc-hover-active');
                    el.style.color = iconColor; // 글자색을 해당 광산 색상으로 변경
                    el.style.textShadow = '1px 1px 0px #fff';
                    el.style.fontSize = '20px';
                });

                layer.on('mouseout', function() {
                    var el = this.getElement().querySelector('div');
                    this.getElement().classList.remove('mc-hover-active');
                    el.style.color = 'transparent'; // 다시 투명하게
                    el.style.textShadow = 'none';
                    el.style.fontSize = '20px';
                });
            }
        });

    </script>
