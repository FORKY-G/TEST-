        /* 1. 팝업창 디자인 (마인크래프트 스타일) */
        .leaflet-popup-content-wrapper {
            background: #C6C6C6 !important;
            border: 3px solid #000000 !important;
            box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
            border-radius: 0px !important;
        }
        .leaflet-popup-tip-container { display: none; } 
        .leaflet-popup-content { margin: 12px 15px !important; color: #3F3F3F !important; font-weight: bold; text-shadow: 1px 1px 0px #ffffff; }

        /* 2. 툴팁 디자인 */
        .custom-tooltip {
            background: #C6C6C6 !important;
            border: 3px solid #000000 !important;
            box-shadow: inset -3px -3px 0px #555555, inset 3px 3px 0px #ffffff !important;
            border-radius: 0px !important;
            color: #3F3F3F !important;
            font-weight: bold !important;
            text-shadow: 1px 1px 0px #ffffff;
            padding: 5px 10px !important;
            opacity: 1 !important;
        }
        .custom-tooltip:before { display: none !important; }

        /* 3. 레이어 컨트롤 박스 */
        .leaflet-control-layers {
            width: 180px;
            background: #C6C6C6 !important;
            border: 3px solid #000 !important;
            box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff !important;
            border-radius: 0px !important;
            padding: 10px;
            max-height: none !important;
            overflow: visible !important;
        }

        .leaflet-control-layers-overlays { 
            font-size: 14px; 
            font-weight: bold; 
            max-height: 400px; 
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px;
        }

        /* 마인크래프트 스타일 커스텀 스크롤바 */
        .leaflet-control-layers-overlays::-webkit-scrollbar { width: 12px; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-track { background: #313131; border: 2px solid #000; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-thumb { background: #8B8B8B; border: 2px solid #ffffff; box-shadow: inset -3px -3px 0px #404040; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-thumb:hover { background: #AAAAAA; }

        /* 4. 사냥터 정보 패널 */
        .info-panel {
            position: absolute; 
            top: 100px; 
            left: 20px; 
            z-index: 3000;
            background: #C6C6C6 !important; 
            padding: 15px;
            border: 3px solid #000 !important;
            box-shadow: inset -4px -4px 0px #555555, inset 4px 4px 0px #ffffff !important;
            border-radius: 0px !important;
            min-width: 250px; 
            display: none;
        }
        .info-panel button {
            margin-top: 15px; cursor: pointer; width: 100%; padding: 8px;
            background: #C6C6C6; border: 2px solid #000;
            box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff;
            color: #3F3F3F; font-weight: bold; text-shadow: 1px 1px 0px #ffffff;

        .hunt-group-label { color: #e74c3c; border-bottom: 2px solid #e74c3c; display: block; margin-top: 10px; margin-bottom: 5px; }
        .herb-group-label { color: #8e44ad; border-bottom: 2px solid #8e44ad; display: block; margin-top: 10px; margin-bottom: 5px; }
        .mine-group-label { color: #27ae60; border-bottom: 2px solid #27ae60; display: block; margin-top: 10px; margin-bottom: 5px; }
        .divider-line { border-bottom: 1px solid #ccc; display: block; margin: 5px 0; }

        .leaflet-control-layers-overlays label:has(.divider-line) input,
        .leaflet-control-layers-overlays label:has(.mine-group-label) input,
        .leaflet-control-layers-overlays label:has(.hunt-group-label) input,
        .leaflet-control-layers-overlays label:has(.herb-group-label) input { display: none !important; }

        .hunt-name-clickable:hover { text-decoration: underline; }

        /* 6. 검색창 스타일 */
        #search-container input {
            background: #000; color: #fff; border: 2px solid #fff;
            padding: 10px 15px; font-size: 16px; outline: none;

            display: flex;
            justify-content: center;
            align-items: center;

            width: 14px;
            height: 14px;
            border: 1px solid #000;
            box-shadow: inset -1px -1px 0px #555, inset 1px 1px 0px #fff;
        }
    </style>

            { name: "흑성과", file: "hub14.png", coords: mcToPx(-1671, -3534), mcX: -1671, mcZ: -3534 },
            { name: "흑성과", file: "hub14.png", coords: mcToPx(1578, -128), mcX: 1578, mcZ: -128 },
            { name: "월계엽", file: "hub15.png", coords: mcToPx(-1622, -6433), mcX: -1622, mcZ: -6433 },
            { name: "철목영지", file: "hub16.png", coords: mcToPx(-3901, 2699), mcX: -3901, mcZ: 2699 },
            { name: "금향과", file: "hub17.png", coords: mcToPx(-702, 730), mcX: -702, mcZ: 730 },
            { name: "금향과", file: "hub17.png", coords: mcToPx(-772, 1917), mcX: -772, mcZ: 1917 },
            { name: "빙백설화", file: "hub18.png", coords: mcToPx(6630, -264), mcX: 6630, mcZ: -264 },
            { name: "빙백설화", file: "hub18.png", coords: mcToPx(6017, -203), mcX: 6017, mcZ: -203 }
        ];

        var zodiacData = [ { name: "소", x: -616, z: 3889 }, { name: "닭", x: 5075, z: -344 }, { name: "토끼", x: 4590, z: -3397 }, { name: "뱀", x: 2685, z: -4051 }, { name: "돼지", x: -3657, z: 1112 }, { name: "개", x: -4455, z: -2376 }, { name: "말", x: -2365, z: 3968 }, { name: "원숭이", x: 3280, z: 2952 }, { name: "양", x: 5093, z: 2092 }, { name: "호랑이", x: -5500, z: -1600 }, { name: "용", x: -891, z: -536 }, { name: "쥐", x: -2900, z: -4600 } ];

        var huntingInfo = [
            { name: "경작지", lv: "0~5", monsters: "참새(Lv.0), 허수아비(Lv.5)", file: "map2.png", center: mcToPx(-954, -666) },
            { name: "화수원", lv: "10~20", monsters: "다람쥐(Lv.10), 흙토끼(Lv.15), 백토끼(Lv.20)", file: "map3.png", center: mcToPx(-586, 446) },
            { name: "괴암곡", lv: "25~35", monsters: "하급쥐(Lv.25), 중급쥐(Lv.30), 상급쥐(Lv.35)<br><span style='color: #e74c3c;'>*정예쥐 출현</span>", file: "map4.png", center: mcToPx(1320, -1598) },
            { name: "멸문", lv: "40~50", monsters: "뱀(Lv.40), 청사(Lv.45), 적사(Lv.50)<br><span style='color: #e74c3c;'>*구렁이 출현</span>", file: "map5.png", center: mcToPx(3862, -2644) },
            { name: "신선원", lv: "55~65", monsters: "새싹삼(Lv.55), 진삼(Lv.60), 대장삼(Lv.65)<br><span style='color: #e74c3c;'>*거대삼 출현</span>", file: "map6.png", center: mcToPx(-3628, -3094) },
            { name: "천웅성", lv: "70~80", monsters: "비웅(Lv.70), 겸웅(Lv.75), 꼬마유령(Lv.80)", file: "map7.png", center: mcToPx(5700, 5198) },
            { name: "매화곡", lv: "85~90", monsters: "천도원숭이(Lv.85), 황도원숭이(Lv.90)", file: "map8.png", center: mcToPx(4256, 392) },
            { name: "이매궁", lv: "100~110", monsters: "도깨비(Lv.100), 청깨비(Lv.105), 진깨비(Lv.110)", file: "map9.png", center: mcToPx(1634, 336) },
            { name: "검성지묘", lv: "115~125", monsters: "강암수호(Lv.115), 새끼암갑수(Lv.120), 암갑수(Lv.125)", file: "map10.png", center: mcToPx(-5436, -802) },
            { name: "빙설곡", lv: "130~140", monsters: "백랑(Lv.130), 적호(Lv.135), 백호(Lv.140)", file: "map11.png", center: mcToPx(6784, -2500) },
            { name: "빙궁", lv: "145~155", monsters: "빙궁조(Lv.145), 빙궁병(Lv.150), 북해신녀(Lv.155)", file: "map12.png", center: mcToPx(6572, 948) },
            { name: "협사곡", lv: "160~170", monsters: "산적(Lv.160), 산적궁수(Lv.165), 멧돼지산적(Lv.170)", file: "map13.png", center: mcToPx(-282, 4318) },
            { name: "황야성", lv: "175~185", monsters: "토석병(Lv.175), 토석군(Lv.180), 토석궁사(Lv.185)", file: "map14.png", center: mcToPx(-2080, 1996) },
            { name: "운해궁", lv: "만렙", monsters: "최종구역", file: "map15.png", center: mcToPx(-1422, 5612) }
        ];

        // 3. 레이어 초기화
        var poiLayers = { '스폰': L.layerGroup(), '십이간지': L.layerGroup(), '녹색광산': L.layerGroup(), '청색광산': L.layerGroup(), '황색광산': L.layerGroup(), '적색광산': L.layerGroup() };
        var herbLayers = {}, huntingLayers = {}, allHerbsGroup = L.layerGroup();

        // 4. 사냥터 레이어 생성 및 정보 표시 함수
        function showHuntingInfo(info) {
            document.getElementById('panel-name').innerHTML = `<span style="font-size: 24px;"><b>${info.name}</b></span> <span style="font-size: 16px; color: #666;">(${info.lv})</span>`;
            document.getElementById('panel-lv').innerHTML = `<div style="margin-top: 8px; font-size: 16px; color: #444;">${info.monsters}</div>`;
            document.getElementById('hunting-info-panel').style.display = 'block';
        }

        huntingInfo.forEach(function(info) {
            var imgOverlay = L.imageOverlay(info.file, imageBounds, { opacity: 0.6, interactive: false });
            var clickMarker = L.circleMarker(info.center, { radius: 35, color: '#e74c3c', weight: 1, fillOpacity: 0.1 });
            
            imgOverlay.on('add', function() { showHuntingInfo(info); });
            imgOverlay.on('remove', function() { document.getElementById('hunting-info-panel').style.display = 'none'; });
            clickMarker.on('click', function() { showHuntingInfo(info); });

            huntingLayers[info.name] = L.layerGroup([imgOverlay, clickMarker]);
        });

        // 5. 광산 마커 생성
        poiData.forEach(function(poi) {
            var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
            if(key) {
                L.marker(poi.coords, {icon: createHtmlIcon(poi.color)}).addTo(poiLayers[key])
                 .bindPopup(`<div style="text-align:center;"><b>${poi.name === "스폰" ? "스폰 지점" : poi.name + " 광산"}</b><br>[ ${poi.mcX}, ${poi.mcZ} ]</div>`);
            }
        });

        // 약초 마커
        herbData.forEach(function(herb) {
            var hCol = herbColors[herb.name] || '#8e44ad';
            if (!herbLayers[herb.name]) herbLayers[herb.name] = L.layerGroup();
            L.marker(herb.coords, { icon: createHerbIcon(hCol) }).addTo(herbLayers[herb.name])
             .bindPopup(`<div style="text-align:center;"><b style="color:${hCol}">${herb.name}</b><br>[ ${herb.mcX}, ${herb.mcZ} ]</div>`);
        });

        // 십이간지 마커
        zodiacData.forEach(function(z) {
            L.marker(mcToPx(z.x, z.z), { icon: L.divIcon({ className: 'zodiac-icon', html: `<div style="width:60px; height:60px;"></div>`, iconSize: [60, 60], iconAnchor: [30, 30] }) }).addTo(poiLayers['십이간지'])
             .bindTooltip(`<div style="text-align:center;"><b style="font-size:22px; color:#e67e22;">${z.name}</b><br>MC: ${z.x}, ${z.z}</div>`, { direction: 'top', className: 'custom-tooltip', opacity: 0.95 });
        });

        // 6. 레이어 컨트롤 구성
        poiLayers['스폰'].addTo(map);
        poiLayers['십이간지'].addTo(map);

        var menuOrder = {
            "스폰": poiLayers['스폰'], "십이간지": poiLayers['십이간지'],
            "<span class='divider-line'></span>": L.layerGroup(), 
            "<span class='mine-group-label'>💎 광산 구역</span>": L.layerGroup(),
            "녹색광산": poiLayers['녹색광산'], "청색광산": poiLayers['청색광산'], "황색광산": poiLayers['황색광산'], "적색광산": poiLayers['적색광산'],
            "<span class='hunt-group-label'>⚔️ 사냥터 구역</span>": L.layerGroup()
        };

        // 사냥터 메뉴 이름 클릭 시 이동 이벤트 추가
        huntingInfo.forEach(function(info) { 
            var labelHtml = `<span class="hunt-name-clickable" onclick="moveAndShowHunt('${info.name}')">${info.name}</span>`;
            menuOrder[labelHtml] = huntingLayers[info.name]; 
        });

        menuOrder["<span class='herb-group-label'>🌿 약초 서식지 </span>"] = allHerbsGroup;
        Object.keys(herbLayers).sort().forEach(function(name) { menuOrder[name] = herbLayers[name]; });

        L.control.layers(null, menuOrder, {collapsed: false}).addTo(map);

        // 사냥터 클릭 이동 함수
        window.moveAndShowHunt = function(huntName) {
            var info = huntingInfo.find(h => h.name === huntName);
            if (info) {
                map.setView(info.center, -1);
                if (!map.hasLayer(huntingLayers[info.name])) {
                    map.addLayer(huntingLayers[info.name]);
                    updateLayerCheckbox(info.name, true);
                } else {
                    showHuntingInfo(info);
                }
            }
        };

        // 7. 검색 기능
        function executeSearch() {
            var input = document.getElementById('search-input');
            var query = input.value.trim(); if (!query) return;
            var found = false, target = null, targetMarker = null;

            huntingInfo.forEach(function(info) {
                if (info.name.includes(query)) {
                    target = info.center; found = true;
                    if (!map.hasLayer(huntingLayers[info.name])) { map.addLayer(huntingLayers[info.name]); updateLayerCheckbox(info.name, true); }
                }
            });
            if (!found) {
                poiData.forEach(function(poi) {
                    if (poi.name === query || (poi.name + "번").includes(query)) {
                        target = poi.coords; found = true;
                        var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
                        if (key) {
                            if (!map.hasLayer(poiLayers[key])) { map.addLayer(poiLayers[key]); updateLayerCheckbox(key, true); }
                            poiLayers[key].eachLayer(function(l) { if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; });
                        }
                    }
                });
            }
            if (!found) {
                herbData.forEach(function(herb) {
                    if (herb.name.includes(query)) {
                        target = herb.coords; found = true;
                        if (!map.hasLayer(herbLayers[herb.name])) { map.addLayer(herbLayers[herb.name]); updateLayerCheckbox(herb.name, true); }
                        herbLayers[herb.name].eachLayer(function(l) { if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; });
                    }
                });
            }
            if (found) { map.setView(target, -1); if (targetMarker) targetMarker.openPopup(); input.value = ""; } 
            else { alert("검색 결과가 없습니다."); }
        }

        function updateLayerCheckbox(name, isAdd) {
            var labels = document.querySelectorAll('.leaflet-control-layers-overlays label');
            labels.forEach(function(label) {
                if (label.innerText.trim() === name) {
                    var cb = label.querySelector('input');
                    if (cb) cb.checked = isAdd;
                }
            });
        }

        // 8. 좌표 표시
        L.control.mousePosition({ position: 'bottomleft', separator: ', ', prefix: '좌표: ' }).addTo(map);
</script>
</body>
