        html, body {

            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤바 제거 */

        .leaflet-popup-content-wrapper {
            background: #C6C6C6 !important;

            border-radius: 0px !important;

        .leaflet-popup-tip-container { display: none; } 
        .leaflet-popup-content { margin: 12px 15px !important; color: #3F3F3F !important; font-weight: bold; text-shadow: 1px 1px 0px #ffffff; }

        .custom-tooltip {
            background: #C6C6C6 !important;
            border: 3px solid #000000 !important;
            box-shadow: inset -3px -3px 0px #555555, inset 3px 3px 0px #ffffff !important;
            border-radius: 0px !important;
            color: #3F3F3F !important;
            font-weight: bold !important;
            text-shadow: 1px 1px 0px #ffffff;
            padding: 5px 10px !important;
            opacity: 1 !important;
        }
        .custom-tooltip:before { display: none !important; }

        .leaflet-control-layers {
            width: 180px;
            background: #C6C6C6 !important;
            border: 3px solid #000 !important;
            box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff !important;
            border-radius: 0px !important;
            padding: 10px;
            max-height: none !important;
        }

        .leaflet-control-layers-overlays { 
            font-size: 14px; 
            font-weight: bold; 
            max-height: 400px; 
            overflow-y: auto;
        }

        .leaflet-control-layers-overlays::-webkit-scrollbar { width: 12px; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-track { background: #313131; border: 2px solid #000; }
        .leaflet-control-layers-overlays::-webkit-scrollbar-thumb { background: #8B8B8B; border: 2px solid #ffffff; box-shadow: inset -3px -3px 0px #404040; }

        .info-panel {
            position: absolute; 
            top: 100px; 
            left: 20px;

            background: #C6C6C6 !important; 
            padding: 15px;
            border: 3px solid #000 !important;

        .leaflet-control-layers-overlays label:has(.divider-line) input,
        .leaflet-control-layers-overlays label:has(.mine-group-label) input,
        .leaflet-control-layers-overlays label:has(.hunt-group-label) input,

// 사냥터 클릭 시 이동 및 정보 표시 함수
window.moveAndShowHunt = function(name) {
    var info = huntingInfo.find(h => h.name === name);
    if (info) {
        // 1. 해당 사냥터 레이어 켜기
        if (!map.hasLayer(huntingLayers[name])) {
            map.addLayer(huntingLayers[name]);
            updateLayerCheckbox(name, true);
        }
        // 2. 해당 위치로 이동 (줌 레벨은 현재 설정에 맞춰 -1로 유지)
        map.setView(info.center, -1);
        // 3. 정보창 표시
        showHuntingInfo(info);
    }
};

        window.toggleHuntingList = function() {

// 모든 사냥터 레이어 해제 및 체크박스 초기화
window.resetHuntingLayers = function() {
    Object.keys(huntingLayers).forEach(function(name) {
        // 1. 지도에서 레이어 제거
        if (map.hasLayer(huntingLayers[name])) {
            map.removeLayer(huntingLayers[name]);
        }
        // 2. 우측 메뉴의 체크박스 체크 해제 (이게 빠져있었을 겁니다)
        updateLayerCheckbox(name, false);
    });
    // 정보창 닫기
    document.getElementById('hunting-info-panel').style.display = 'none';
};

// 모든 약초 레이어 초기화 함수
window.resetHerbLayers = function() {
    Object.keys(herbLayers).forEach(function(name) {
        if (map.hasLayer(herbLayers[name])) {
            map.removeLayer(herbLayers[name]);
        }
    });
    document.getElementById('hunting-info-panel').style.display = 'none';
};

window.moveAndShowHerb = function(name, mcX, mcZ, color, coords) {
    // 1. 해당 약초 레이어가 꺼져있다면 켜기
    if (!map.hasLayer(herbLayers[name])) {
        map.addLayer(herbLayers[name]);
    }

    // 2. 같은 이름을 가진 모든 약초 좌표 데이터 필터링

        </div>
    `).join('');

    // 3. 희귀 약초 여부 판단 및 맞춤형 HTML 생성
    var rareHerbs = ["월계엽", "철목영지", "금향과", "빙백설화"];
    var isRare = rareHerbs.includes(name);

    var titleExtraHtml = ""; // 이름 옆에 붙을 (희귀)
    var descExtraHtml = "";  // 이름 아래에 붙을 설명

    if (isRare) {
        // [희귀 약초인 경우]
        titleExtraHtml = ` <span style="color:#e74c3c; font-size:14px;">(희귀)</span>`;

        descExtraHtml = `<div style="font-size:9px; color:#555; margin-top:2px;">희귀 약초는 광범위하게 스폰됩니다.</div>`;
    } else {
        // [일반 약초인 경우]
        // 이름 글씨(18px)보다 2배 작은 9px + 빨간색 글씨로 설정
        descExtraHtml = `<div style="font-size:9px; color:#e74c3c; margin-top:2px; font-weight:bold;">위 좌표들은 명확하지 않을 수 있습니다.</div>`;
    }

    // 4. 정보창(hunting-info-panel) 표시
    var panel = document.getElementById('hunting-info-panel');
    panel.style.display = 'block';
    panel.innerHTML = `
        <div style="border-bottom:3px solid ${color}; padding-bottom:8px; margin-bottom:12px; position:relative;">
            <b style="font-size:18px; color:#3F3F3F; text-shadow:1px 1px 0px #fff;">${name}</b>${titleExtraHtml}
            ${descExtraHtml}
            <span style="position:absolute; right:0; top:0; cursor:pointer; font-weight:bold; padding:5px;" onclick="document.getElementById('hunting-info-panel').style.display='none'">X</span>
        </div>
        <div style="font-size:14px; line-height:1.6; background:rgba(255,255,255,0.5); padding:10px; border:1px solid #888; max-height:150px; overflow-y:auto;">
            ${coordsHtml}
        </div>
        <button onclick="document.getElementById('hunting-info-panel').style.display='none'" 
                style="margin-top:12px; width:100%; cursor:pointer; background:#C6C6C6; border:2px solid #000; box-shadow: inset -2px -2px 0px #555555, inset 2px 2px 0px #ffffff; font-weight:bold; padding:5px;">
            닫기
        </button>
    `;
};


function executeSearch() {
            var input = document.getElementById('search-input');
            var query = input.value.trim(); 
            if (!query) return;

            var found = false, target = null, targetMarker = null;

            // 1. 사냥터 검색 (기존 로직 유지)
            huntingInfo.forEach(function(info) {
                if (info.name.includes(query)) {
                    target = info.center; 
                    found = true;
                    if (!map.hasLayer(huntingLayers[info.name])) { 
                        map.addLayer(huntingLayers[info.name]); 
                        updateLayerCheckbox(info.name, true); 
                    }
                }
            });

            // 2. 광산(poiData) 검색
            if (!found) {
                // [방법 수정] 숫자인 경우 '완전 일치'하는 놈을 먼저 찾음
                var exactMatch = poiData.find(p => p.name === query);
                
                if (exactMatch) {
                    // 1순위: 이름이 완전히 똑같은 경우 (예: 1 검색 시 1번 광산)
                    var poi = exactMatch;
                    target = poi.coords; 
                    found = true;
                    var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
                    if (key) {
                        if (!map.hasLayer(poiLayers[key])) { 
                            map.addLayer(poiLayers[key]); 
                            updateLayerCheckbox(key, true); 
                        }
                        poiLayers[key].eachLayer(function(l) { 
                            if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; 
                        });
                    }
                } else {
                    // 2순위: 완전 일치가 없으면 '번'을 포함해서 검색 (기존 로직)
                    poiData.forEach(function(poi) {
                        if (found) return;
                        if ((poi.name + "번").includes(query)) {
                            target = poi.coords; 
                            found = true;
                            var key = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
                            if (key) {
                                if (!map.hasLayer(poiLayers[key])) { 
                                    map.addLayer(poiLayers[key]); 
                                    updateLayerCheckbox(key, true); 
                                }
                                poiLayers[key].eachLayer(function(l) { 
                                    if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; 
                                });
                            }
                        }
                    });
                }
            }

            // 3. 약초 검색 (누락 방지)
            if (!found) {
                herbData.forEach(function(herb) {
                    if (herb.name.includes(query)) {
                        target = herb.coords; found = true;
                        if (!map.hasLayer(herbLayers[herb.name])) { map.addLayer(herbLayers[herb.name]); updateLayerCheckbox(herb.name, true); }
                        herbLayers[herb.name].eachLayer(function(l) { if (l instanceof L.Marker && l.getLatLng().equals(target)) targetMarker = l; });
                    }
                });
            }

            if (found) { 
                map.setView(target, -1); 
                if (targetMarker) targetMarker.openPopup(); 
                input.value = ""; 
            } else { 
                alert("검색 결과가 없습니다."); 
            }
        }

        function updateLayerCheckbox(name, isAdd) {
            var labels = document.querySelectorAll('.leaflet-control-layers-overlays label');
            labels.forEach(function(label) {
                if (label.innerText.trim() === name) {
                    var cb = label.querySelector('input');
                    if (cb) cb.checked = isAdd;
                }
            });
        }

        L.control.mousePosition({ position: 'bottomleft', separator: ', ', prefix: '좌표: ' }).addTo(map);
    </script>
</body>
</html>
