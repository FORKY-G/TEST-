<!DOCTYPE html>
<html lang="ko">
<head>
    <title>한월환해도 (0328 업데이트)</title>
    </head>
<body>
    <div id="map"></div>
    <script src="data.js"></script>
    
    <script src="map-logic.js"></script>
    
    <script src="ui-control.js"></script>
    
<script>
        // 모든 파일이 로드되었는지 확인 후 실행
        window.onload = function() {
            if (typeof map !== 'undefined') {
                poiLayers['스폰'].addTo(map);
                poiLayers['십이간지'].addTo(map);
                mountainLayers.addTo(map);
                
                if (typeof generateHuntingList === 'function') {
                    generateHuntingList();
                }

                L.control.mousePosition({ 
                    position: 'bottomleft', 
                    separator: ', ', 
                    prefix: '좌표: ' 
                }).addTo(map);

                // 레이어 컨트롤
                L.control.layers(null, {
                    "비석(산)": mountainLayers,
                    "스폰": poiLayers['스폰'],
                    "십이간지": poiLayers['십이간지'],
                    "녹색광산": poiLayers['녹색광산'],
                    "청색광산": poiLayers['청색광산'],
                    "황색광산": poiLayers['황색광산'],
                    "적색광산": poiLayers['적색광산']
                }, { collapsed: false }).addTo(map);

                map.invalidateSize();
            }
        };
    </script>
</body>
</html>
