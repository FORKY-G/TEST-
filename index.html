<!DOCTYPE html>
<html>
  <head>
    <title>한월서버 완전지도</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css">
    <link rel="stylesheet" href="https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js" type="text/javascript"></script>
    <script src="https://cdn.rawgit.com/ardhi/Leaflet.MousePosition/master/src/L.Control.MousePosition.js" type="text/javascript"></script>
    <style>
      html, body, #map { width:100%; height:100%; margin:0; padding:0; z-index: 1; background: #ffffff; }
      #slider{ position: absolute; top: 10px; right: 10px; z-index: 1000; width: 150px; }
      .leaflet-popup-content { font-family: 'Malgun Gothic', sans-serif; font-size: 14px; line-height: 1.4; text-align: center; }
      .poi-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #333; }
      .herb-title { font-weight: bold; font-size: 15px; margin-bottom: 3px; color: #8e44ad; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <input id="slider" type="range" min="0" max="1" step="0.1" value="1" oninput="mapLayer.setOpacity(this.value)">
    
    <script type="text/javascript">
      // [1] 지도 물리적 설정 (다겸님 MapTiler 값 적용)
      var mapExtent = [0.00000000, -14575.00000000, 16384.00000000, 0.00000000];
      var mapMaxZoom = 9;
      var mapMaxResolution = 0.12500000;
      var mapMinResolution = Math.pow(2, mapMaxZoom) * mapMaxResolution;
      var tileExtent = [0.00000000, -14575.00000000, 16384.00000000, 0.00000000];

      var crs = L.CRS.Simple;
      crs.transformation = new L.Transformation(1, -tileExtent[0], -1, tileExtent[3]);
      crs.scale = function(zoom) { return Math.pow(2, zoom) / mapMinResolution; };
      crs.zoom = function(scale) { return Math.log(scale * mapMinResolution) / Math.LN2; };

      var map = new L.Map('map', { maxZoom: mapMaxZoom, minZoom: 0, crs: crs });

      var mapLayer = L.tileLayer('{z}/{x}/{y}.png', { minZoom: 0, maxZoom: mapMaxZoom, noWrap: true, tms: false }).addTo(map);

      map.fitBounds([
        crs.unproject(L.point(mapExtent[2], mapExtent[3])),
        crs.unproject(L.point(mapExtent[0], mapExtent[1]))
      ]);

      // [2] 좌표 변환 기준 (다겸님이 찾은 픽셀 좌표 적용)
      var mcSpawnPxX = 7225; 
      var mcSpawnPxY = 6453; 
      var mcSpawnCoordX = -971;
      var mcSpawnCoordZ = -965;

      function mcToPx(mcX, mcZ) {
          var deltaX = mcX - mcSpawnCoordX;
          var deltaZ = mcZ - mcSpawnCoordZ;
          return [-(mcSpawnPxY + deltaZ), mcSpawnPxX + deltaX];
      }

      // [3] 색상 아이콘 생성 함수
      function createHtmlIcon(color, labelText, type = 'point') {
        var size = type === 'herb' ? [20, 20] : [24, 24]; // 약초는 조금 작게
        var anchor = [size[0] / 2, size[1]]; // 아이콘의 하단 중앙이 좌표에 오도록 설정
        var popupAnchor = [0, -size[1]]; // 팝업이 아이콘 위에 뜨도록 설정

        return L.divIcon({
          className: 'custom-icon',
          html: type === 'herb' ? 
                `<svg width="${size[0]}" height="${size[1]}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                   <circle cx="12" cy="12" r="10" fill="${color}" stroke="#6c3483" stroke-width="2"/>
                 </svg>
                 <span style="position:absolute; top:-22px; left:50%; transform:translateX(-50%); background:white; padding:1px 6px; border-radius:10px; border:2px solid ${color}; font-size:11px; white-space:nowrap; color:${color}; font-weight:bold; box-shadow: 0px 2px 4px rgba(0,0,0,0.2);">${labelText}</span>` :
                `<svg width="${size[0]}" height="${size[1]}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                   <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="${color}" stroke="white" stroke-width="1"/>
                 </svg>
                 <span style="position:absolute; top:-20px; left:50%; transform:translateX(-50%); background:white; padding:1px 6px; border-radius:10px; border:2px solid ${color}; font-size:12px; white-space:nowrap; color:${color}; font-weight:bold; box-shadow: 0px 2px 4px rgba(0,0,0,0.2);">${labelText}</span>`,
          iconSize: size, iconAnchor: anchor, popupAnchor: popupAnchor
        });
      }

      var icons = {
        '스폰': createHtmlIcon('#333333', '스폰'),
        '녹': createHtmlIcon('#2ecc71', '녹'),
        '청': createHtmlIcon('#3498db', '청'),
        '황': createHtmlIcon('#f1c40f', '황'),
        '적': createHtmlIcon('#e74c3c', '적'),
        '약초': createHtmlIcon('#8e44ad', '약초', 'herb') // 약초 전용 보라색
      };

      // [4] 다겸님의 포인트 데이터 (mcToPx 함수 적용 완료)
      var poiData = [
        { name: "스폰", type: "스폰", color: "#333", coords: mcToPx(-971, -965) },
        // ... (이전의 1번부터 65번 광산 데이터는 동일) ...
        { name: "1번", type: "녹", color: "#2ecc71", coords: mcToPx(-1093, -701) }, { name: "2번", type: "녹", color: "#2ecc71", coords: mcToPx(-1038, -14) },
        // [여기에 3번부터 65번까지 광산 데이터를 그대로 넣어주세요!]
        // (가독성을 위해 65개 데이터를 모두 코드로 적지는 않았습니다. 다겸님의 기존 코드 poData 부분을 복사해서 붙여넣으시면 됩니다.)
        { name: "65번", type: "황", color: "#f1c40f", coords: mcToPx(-790, 4284) }
      ];

      // [5] 다겸님이 정리해주신 약초 데이터 추가 (번호 문구 적용)
      var herbData = [
        { name: "빙백설화", group: "빙설", type: "엽", coords: mcToPx(6630, -264) }, { name: "빙백설화", group: "빙설", type: "엽", coords: mcToPx(6017, -203) },
        { name: "철목영지", group: "목영", type: "버섯", coords: mcToPx(-3901, 2699) },
        { name: "월계엽", group: "엽", type: "엽", coords: mcToPx(-1622, -6433) },
        { name: "금향과", group: "과", type: "과", coords: mcToPx(-702, 730) }, { name: "금향과", group: "과", type: "과", coords: mcToPx(-772, 1917) },
        { name: "녹태", group: "태", type: "태", coords: mcToPx(-306, -1122) }, { name: "녹태", group: "태", type: "태", coords: mcToPx(1110, -2830) }, { name: "녹태", group: "태", type: "태", coords: mcToPx(-1934, 26) },
        { name: "황초", group: "초", type: "초", coords: mcToPx(-1376, -346) }, { name: "황초", group: "초", type: "초", coords: mcToPx(3348, -4641) }, { name: "황초", group: "초", type: "초", coords: mcToPx(-4178, -4879) },
        { name: "적주과", group: "과", type: "과", coords: mcToPx(-1070, 752) }, { name: "적주과", group: "과", type: "과", coords: mcToPx(-3964, 1223) },
        { name: "옥취엽", group: "엽", type: "엽", coords: mcToPx(-3884, -2432) }, { name: "옥취엽", group: "엽", type: "엽", coords: mcToPx(800, -2112) }, { name: "옥취엽", group: "엽", type: "엽", coords: mcToPx(-1323, -588) },
        { name: "옥향초", group: "초", type: "초", coords: mcToPx(6408, 4024) }, { name: "옥향초", group: "초", type: "초", coords: mcToPx(4800, 3752) },
        { name: "인삼", group: "삼", type: "삼", coords: mcToPx(1432, 4072) }, { name: "인삼", group: "삼", type: "삼", coords: mcToPx(-4705, 765) },
        { name: "자운초", group: "초", type: "초", coords: mcToPx(2744, 4672) }, { name: "자운초", group: "초", type: "초", coords: mcToPx(4032, 4176) },
        { name: "생강", group: "강", type: "강", coords: mcToPx(1248, 5784) }, { name: "생강", group: "강", type: "강", coords: mcToPx(-4713, 2168) }, { name: "생강", group: "강", type: "강", coords: mcToPx(1485, 3133) },
        { name: "민들레", group: "들", type: "들", coords: mcToPx(-3128, -5376) }, { name: "민들레", group: "들", type: "들", coords: mcToPx(1352, -6136) },
        { name: "영군버섯", group: "버섯", type: "버섯", coords: mcToPx(-1744, -6288) }, { name: "영군버섯", group: "버섯", type: "버섯", coords: mcToPx(733, 5074) },
        { name: "금양광초", group: "초", type: "초", coords: mcToPx(3633, 1015) }, { name: "금양광초", group: "초", type: "초", coords: mcToPx(3362, 2698) },
        { name: "권엽", group: "엽", type: "엽", coords: mcToPx(-4543, -694) }, { name: "권엽", group: "엽", type: "엽", coords: mcToPx(-4386, 142) },
        { name: "흑성과", group: "과", type: "과", coords: mcToPx(-1671, -3534) }, { name: "흑성과", group: "과", type: "과", coords: mcToPx(1578, -128) },
        { name: "백향초", group: "초", type: "초", coords: mcToPx(-5488, 4162) }
      ];

      var poiLayers = { '스폰': L.layerGroup(), '녹 지점': L.layerGroup(), '청 지점': L.layerGroup(), '황 지점': L.layerGroup(), '적 지점': L.layerGroup(), '약초 지점': L.layerGroup() };

      // 광산 데이터 추가 (번호 문구 적용)
      poiData.forEach(function(poi) {
        var groupKey = poi.type === '스폰' ? '스폰' : poi.type + ' 지점';
        var icon = createHtmlIcon(poi.color, poi.name);
        L.marker(poi.coords, {icon: icon}).addTo(poiLayers[groupKey])
          .bindPopup(`<div class="poi-title">${poi.name} (${poi.type})</div>`);
      });

      // 약초 데이터 추가 (한 글자 라벨 적용)
      herbData.forEach(function(herb) {
        var icon = createHtmlIcon('#8e44ad', herb.group, 'herb'); // 약초 전용 아이콘 적용
        L.marker(herb.coords, {icon: icon}).addTo(poiLayers['약초 지점'])
          .bindPopup(`<div class="herb-title">${herb.name} (${herb.group})</div><div class="coord-info">마인크래프트 좌표: ${herb.coords[1]}, ${-herb.coords[0]}</div>`); // 좌표 정보를 팝업에 추가
      });

      for (var key in poiLayers) { poiLayers[key].addTo(map); }
      L.control.layers(null, poiLayers, {collapsed: false}).addTo(map);
      L.control.mousePosition({position: 'bottomleft', separator: ', ', prefix: '좌표: '}).addTo(map);
    </script>
  </body>
</html>
