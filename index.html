          panelName.innerHTML = `<span style="font-size: 24px;"><b>${info.name}</b></span> <span style="font-size: 16px; color: #666;">(${info.lv})</span>`;
          panelLv.innerHTML = `<div style="margin-top: 8px; font-size: 16px; font-weight: normal; color: #444; line-height: 1.4;">${info.monsters}</div>`;
          infoPanel.style.display = 'block';
        }

        // [추가] 메뉴에서 레이어가 추가될 때(체크할 때) 정보창 실행
        imgOverlay.on('add', function() {
          showInfo();
        });

        // [추가] 메뉴에서 레이어가 제거될 때(체크 해제할 때) 정보창 닫기 (선택 사항)
        imgOverlay.on('remove', function() {
          infoPanel.style.display = 'none';
        });

        // 기존 원 클릭 시에도 정보창이 뜨도록 유지
        clickMarker.on('click', showInfo);

        // 이미지와 원을 하나의 그룹으로 묶음
        huntingLayers[info.name] = L.layerGroup([imgOverlay, clickMarker]);
      });
      // 스폰/광산
      poiData.forEach(function(poi) {
        var groupKey = (poi.type === '스폰') ? '스폰' : (poi.type === '녹') ? '녹색광산' : (poi.type === '청') ? '청색광산' : (poi.type === '황') ? '황색광산' : (poi.type === '적') ? '적색광산' : null;
        if(groupKey) L.marker(poi.coords, {icon: createHtmlIcon(poi.color, poi.name)}).addTo(poiLayers[groupKey]).bindPopup(`<b>${poi.name}번 광산</b>`);
      });

      // 약초
      herbData.forEach(function(herb) {
        if (!herbLayers[herb.name]) herbLayers[herb.name] = L.layerGroup();
        var hCol = herbColors[herb.name] || '#9b59b6';
        L.marker(herb.coords, {icon: createHtmlIcon('#8e44ad', herb.label, true)}).addTo(herbLayers[herb.name]).bindPopup(`<b>${herb.name}</b>`);
        L.circle(herb.coords, { color: hCol, fillColor: hCol, fillOpacity: 0.15, radius: 100 }).addTo(herbLayers[herb.name]);
      });

      // 십이간지 (중복 방지를 위해 단 한 번만 실행)
      zodiacData.forEach(function(z) {
        var zodiacMarker = L.marker(mcToPx(z.x, z.z), { icon: createZodiacIcon(), riseOnHover: true }).addTo(poiLayers['십이간지']);
        zodiacMarker.bindTooltip(`<div style="text-align:center;"><b style="font-size:22px; color:#e67e22;">${z.name}</b><br><span style="font-size:16px;">MC 좌표: ${z.x}, ${z.z}</span></div>`, { direction: 'top', className: 'custom-tooltip', opacity: 0.95, offset: [0, -10] });
      });

      // [5] 초기 활성화
      poiLayers['스폰'].addTo(map);
      poiLayers['십이간지'].addTo(map);

// [6] 레이어 메뉴 구성
      var menuOrder = {
        "스폰": poiLayers['스폰'],
        "십이간지": poiLayers['십이간지'],
        
        // 광산 카테고리 (사냥터 위에 배치)
        "<span class='mine-group-label' style='color: #27ae60; border-bottom: 2px solid #27ae60; display: block; margin-top: 10px; margin-bottom: 5px; font-weight: bold;'>💎 광산 구역</span>": L.layerGroup(),
        "녹색광산": poiLayers['녹색광산'],
        "청색광산": poiLayers['청색광산'],
        "황색광산": poiLayers['황색광산'],
        "적색광산": poiLayers['적색광산'],

        "<span class='hunt-group-label'>⚔️ 사냥터 구역</span>": L.layerGroup()
      };
      
      // 사냥터 목록 추가
      huntingInfo.forEach(function(i) { menuOrder[i.name] = huntingLayers[i.name]; });
      
      // 약초 카테고리
      menuOrder["<span class='herb-group-label' style='cursor:pointer;'>🌿 약초 서식지 </span>"] = allHerbsGroup;
      
      var herbNames = Object.keys(herbLayers).sort();
      herbNames.forEach(function(name) { menuOrder[name] = herbLayers[name]; });

      L.control.layers(null, menuOrder, {collapsed: false}).addTo(map);
      // [7] 이벤트 핸들러
      map.on('overlayadd', function(e) {
        if (e.name.includes('약초 서식지')) {
          herbNames.forEach(function(name) {
            if (!map.hasLayer(herbLayers[name])) { map.addLayer(herbLayers[name]); updateLayerCheckbox(name, true); }
          });
        }
      });
      map.on('overlayremove', function(e) {
        if (e.name.includes('약초 서식지')) {
          herbNames.forEach(function(name) {
            if (map.hasLayer(herbLayers[name])) { map.removeLayer(herbLayers[name]); updateLayerCheckbox(name, false); }
          });
        }
      });

      function updateLayerCheckbox(name, isChecked) {
        var labels = document.querySelectorAll('.leaflet-control-layers-overlays label');
        labels.forEach(function(label) {
          if (label.innerText.trim() === name) {
            var checkbox = label.querySelector('input');
            if (checkbox) checkbox.checked = isChecked;
          }
        });
      }

      L.control.mousePosition({position: 'bottomleft', separator: ', ', prefix: '좌표: '}).addTo(map);
    </script>
  </body>
</html>
