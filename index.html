        // '전체 선택' 체크박스를 켰을 때
        if (e.name.includes('약초 서식지')) {
          herbNames.forEach(function(name) {
            if (!map.hasLayer(herbLayers[name])) {
              map.addLayer(herbLayers[name]);
              updateLayerCheckbox(name, true); // UI 체크박스 켜기
            }
          });
        }
      });

      map.on('overlayremove', function(e) {
        // '전체 선택' 체크박스를 껐을 때
        if (e.name.includes('약초 서식지')) {
          herbNames.forEach(function(name) {
            if (map.hasLayer(herbLayers[name])) {
              map.removeLayer(herbLayers[name]);
              updateLayerCheckbox(name, false); // UI 체크박스 끄기 (핵심!)
            }
          });
        }
      });

      // 메뉴 UI(HTML) 내의 실제 체크박스 요소를 찾아서 상태를 바꿔주는 함수
      function updateLayerCheckbox(name, isChecked) {
        // Leaflet 메뉴 안의 모든 label 요소를 가져옵니다.
        var layersContainer = document.querySelector('.leaflet-control-layers-overlays');
        var labels = layersContainer.querySelectorAll('label');
        
        labels.forEach(function(label) {
          // 레이블 텍스트와 약초 이름이 일치하는지 확인
          if (label.innerText.trim() === name) {
            var checkbox = label.querySelector('input');
            if (checkbox) {
              checkbox.checked = isChecked; // 체크박스 시각적 상태 변경
            }
          }
        });
      }

      // 메뉴 UI의 체크박스 상태를 동기화해주는 함수
      function updateLayerCheckbox(name, isChecked) {
        var labels = document.querySelectorAll('.leaflet-control-layers-overlays label');
        labels.forEach(function(label) {
          if (label.innerText.trim() === name) {
            label.querySelector('input').checked = isChecked;
          }
        });
      }

      L.control.mousePosition({position: 'bottomleft', separator: ', ', prefix: '좌표: '}).addTo(map);    </script>
  </body>
</html>
